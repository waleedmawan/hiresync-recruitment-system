services:

  app:
    build: .
    container_name: recruitment_app
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mysql
      - redis
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: recruitment_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: recruitment_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: recruitment_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
